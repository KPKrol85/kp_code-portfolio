  <body>
    <a class="skip-link" href="#main">Przejdź do treści</a>
    <header class="site-header" data-partial-src="partials/header.html"></header>

    <main id="main" class="section">
      <div class="container">
        <div class="section-header">
          <div class="section-header__intro">
            <p class="kicker">Twój koszyk</p>
            <h1>Podsumowanie zakupów</h1>
          </div>
          <a class="btn btn--ghost" href="kategoria.html">Kontynuuj zakupy</a>
        </div>
        <div class="cart">
          <div class="card card--padded">
            <div data-cart-container></div>
            <noscript>
              <section class="notice stack" role="status" aria-label="Koszyk bez JavaScriptu">
                <h2>Podsumowanie koszyka bez JavaScriptu</h2>
                <p>
                  Dynamiczna zawartość koszyka i automatyczne podsumowanie wartości zamówienia
                  wymagają JavaScriptu.
                </p>
                <p>W trybie podstawowym możesz:</p>
                <ul>
                  <li><a href="kategoria.html">wrócić do kategorii i przeglądać ofertę</a>,</li>
                  <li><a href="produkt.html">otworzyć przykładową kartę produktu</a>,</li>
                  <li><a href="kontakt.html">skontaktować się z obsługą, aby dokończyć zamówienie</a>.</li>
                </ul>
              </section>
            </noscript>
            <div class="ui-state" data-cart-state hidden></div>
          </div>
          <div class="cart-summary" data-cart-summary>
            <p class="subtle">Dodaj produkty, aby zobaczyć podsumowanie.</p>
          </div>
        </div>
        <div class="button-group section-actions">
          <a class="btn btn--outline" href="kategoria.html">Kontynuuj zakupy</a>
          <a class="btn" href="checkout.html">Przejdź do checkout</a>
        </div>
      </div>
    </main>
    <footer class="site-footer" aria-label="Stopka Outland Gear" data-partial-src="partials/footer.html"></footer>


    <div class="toast" data-toast role="status" aria-live="polite"></div>

    <script type="module" src="js/app.js"></script>
  </body>
