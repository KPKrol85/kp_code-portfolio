    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Produkt — Outland Gear" />
    <meta name="twitter:description" content="Szczegóły produktu Outland Gear: opis, specyfikacja i rekomendacje." />
    <meta name="twitter:image" content="https://outlandgear.example.com/assets/svg/social-share-placeholder.svg" />
    <link rel="icon" href="assets/svg/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/main.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Outland Gear",
        "url": "https://outlandgear.example.com/",
        "logo": "https://outlandgear.example.com/assets/svg/logo.svg"
      }
    </script>
    <script type="application/ld+json" data-schema="webpage">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Produkt — Outland Gear",
        "description": "Szczegóły produktu Outland Gear: opis, specyfikacja i rekomendacje.",
        "url": "https://outlandgear.example.com/produkt.html",
        "inLanguage": "pl-PL",
        "isPartOf": {
          "@type": "WebSite",
          "name": "Outland Gear",
          "url": "https://outlandgear.example.com/"
        }
      }
    </script>
    <script type="application/ld+json" data-schema="product">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Produkt — Outland Gear",
        "description": "Szczegóły produktu Outland Gear: opis, specyfikacja i rekomendacje.",
        "url": "https://outlandgear.example.com/produkt.html",
        "image": ["https://outlandgear.example.com/assets/svg/social-share-placeholder.svg"]
      }
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Przejdź do treści</a>
    <header class="site-header" data-partial-src="partials/header.html"></header>

    <main id="main" class="section" data-product-root>
      <noscript>
        <div class="container">
          <section class="notice stack" role="status" aria-label="Informacje o produkcie bez JavaScriptu">
            <h2>Karta produktu w trybie podstawowym</h2>
            <p>
              Pełna konfiguracja wariantów, stan magazynowy i dodawanie do koszyka działają po
              włączeniu JavaScriptu.
            </p>
            <p>
              Jeśli potrzebujesz pomocy z doborem sprzętu lub chcesz złożyć zamówienie, skontaktuj
              się z nami — przygotujemy ofertę ręcznie.
            </p>
            <p>
              <a class="btn btn--ghost btn--small" href="kontakt.html">Przejdź do kontaktu</a>
              <a class="btn btn--ghost btn--small" href="kategoria.html">Wróć do kategorii</a>
            </p>
          </section>
        </div>
      </noscript>
      <div class="container">
        <div class="ui-state" data-product-state hidden></div>
        <div class="product-layout">
          <div class="gallery">
            <div class="gallery__main">
              <img data-product-main src="assets/svg/product-01.svg" alt="Zdjęcie produktu Outland Ridge 45L" width="480" height="360" />
            </div>
            <div class="gallery__thumbs" aria-label="Miniatury">
              <button type="button" data-product-thumb aria-label="Pokaż zdjęcie 1 produktu Outland Ridge 45L">
                <img src="assets/svg/product-01.svg" alt="" width="96" height="64" loading="lazy" aria-hidden="true" />
              </button>
              <button type="button" data-product-thumb aria-label="Pokaż zdjęcie 2 produktu Outland Ridge 45L">
                <img src="assets/svg/product-02.svg" alt="" width="96" height="64" loading="lazy" aria-hidden="true" />
              </button>
              <button type="button" data-product-thumb aria-label="Pokaż zdjęcie 3 produktu Outland Ridge 45L">
                <img src="assets/svg/product-03.svg" alt="" width="96" height="64" loading="lazy" aria-hidden="true" />
              </button>
              <button type="button" data-product-thumb aria-pressed="true">
                <img src="assets/svg/product-01.svg" alt="" width="96" height="64" loading="lazy" />
              </button>
              <button type="button" data-product-thumb aria-pressed="false">
                <img src="assets/svg/product-02.svg" alt="" width="96" height="64" loading="lazy" />
              </button>
              <button type="button" data-product-thumb aria-pressed="false">
                <img src="assets/svg/product-03.svg" alt="" width="96" height="64" loading="lazy" />
              </button>
            </div>
          </div>
          <div class="product-meta">
            <div class="section-header__intro">
              <p class="kicker">Outland Gear</p>
              <h1 data-product-title>Outland Ridge 45L</h1>
              <p class="subtle section-header__lead" data-product-rating>Ocena 4.7 • 128 opinii</p>
            </div>
            <div>
              <div class="product-price" data-product-price>649 PLN</div>
              <div class="subtle" data-product-old-price></div>
              <p class="badge" data-product-stock>Dostępny</p>
            </div>
            <p data-product-description></p>
            <ul class="stack" data-product-highlights></ul>
            <div class="row">
              <label class="form__label" for="qty">Ilość</label>
              <input class="form__input" id="qty" type="number" min="1" max="10" value="1" data-qty-input />
              <button class="btn" type="button" data-add-product>Dodaj do koszyka</button>
            </div>
            <div class="product-specs">
              <h2>Specyfikacja</h2>
              <table>
                <tbody data-product-specs></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <section class="section">
        <div class="container">
          <div class="section-header">
            <h2 class="section-header__title">Często kupowane razem</h2>
            <a class="btn btn--ghost" href="kategoria.html">Zobacz więcej</a>
          </div>
          <div class="grid grid--3" data-related-grid></div>
        </div>
      </section>
    </main>
    <footer class="site-footer" aria-label="Stopka Outland Gear" data-partial-src="partials/footer.html"></footer>


    <div class="toast" data-toast role="status" aria-live="polite"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
