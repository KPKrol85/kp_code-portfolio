  <body>
    <a class="skip-link" href="#main">Przejdź do treści</a>
    <header class="site-header" data-partial-src="partials/header.html"></header>

    <main id="main">
      <section class="section section--tight">
        <div class="container">
          <img src="assets/svg/banner.svg" alt="Nowa kolekcja Outland Gear" width="1200" height="320" />
        </div>
      </section>
      <section class="section">
        <div class="container">
          <div class="section-header">
            <div class="section-header__intro">
              <p class="kicker">Marketplace</p>
              <h1>Nowości i bestsellery</h1>
              <p class="subtle section-header__lead">Wszystkie produkty Outland Gear w jednym miejscu.</p>
            </div>
            <p class="badge" data-listing-count>0 produktów</p>
          </div>
          <div class="listing-layout">
            <aside class="filters">
              <form class="filters__form" data-filters-form>
                <fieldset class="filters__group">
                  <legend class="filters__title">Cena</legend>
                <select class="form__select" name="price">
                  <option value="">Wszystkie</option>
                  <option value="0-150">0–150 PLN</option>
                  <option value="151-300">151–300 PLN</option>
                  <option value="301-600">301–600 PLN</option>
                  <option value="601-1200">601–1200 PLN</option>
                </select>
                </fieldset>
                <fieldset class="filters__group">
                  <legend class="filters__title">Minimalna ocena</legend>
                <select class="form__select" name="rating">
                  <option value="">Każda</option>
                  <option value="4">4.0+</option>
                  <option value="4.5">4.5+</option>
                </select>
                </fieldset>
                <fieldset class="filters__group">
                  <legend class="filters__title">Podkategorie</legend>
                <select class="form__select" name="subcategory">
                  <option value="">Wszystkie</option>
                  <option value="Plecaki trekkingowe">Plecaki trekkingowe</option>
                  <option value="Plecaki miejskie">Plecaki miejskie</option>
                  <option value="Torby podróżne">Torby podróżne</option>
                  <option value="Saszetki i organizery">Saszetki i organizery</option>
                  <option value="Termosy">Termosy</option>
                  <option value="Kubki termiczne">Kubki termiczne</option>
                  <option value="Butelki filtrujące">Butelki filtrujące</option>
                  <option value="Kuchenki">Kuchenki</option>
                  <option value="Maty i hamaki">Maty i hamaki</option>
                  <option value="Namioty i tarp">Namioty i tarp</option>
                  <option value="Latarki">Latarki</option>
                  <option value="Powerbanki">Powerbanki</option>
                  <option value="Nawigacja">Nawigacja</option>
                  <option value="Karabińczyki">Karabińczyki</option>
                  <option value="Apteczki">Apteczki</option>
                  <option value="Zestawy naprawcze">Zestawy naprawcze</option>
                </select>
                </fieldset>
                <fieldset class="filters__group">
                  <legend class="filters__title">Badge</legend>
                <label class="checkbox">
                  <input type="checkbox" name="badge" value="Bestseller" />
                  Bestseller
                </label>
                <label class="checkbox">
                  <input type="checkbox" name="badge" value="New" />
                  New
                </label>
                <label class="checkbox">
                  <input type="checkbox" name="badge" value="Eco" />
                  Eco
                </label>
                <label class="checkbox">
                  <input type="checkbox" name="badge" value="Limited" />
                  Limited
                </label>
                </fieldset>
                <fieldset class="filters__group">
                  <legend class="filters__title">Sortowanie</legend>
                <select class="form__select" name="sort">
                  <option value="popularity">Popularność</option>
                  <option value="priceAsc">Cena rosnąco</option>
                  <option value="priceDesc">Cena malejąco</option>
                  <option value="newest">Najnowsze</option>
                </select>
                </fieldset>
              </form>
            </aside>
            <div>
              <div class="grid grid--3" data-listing-grid></div>
              <noscript>
                <section class="notice stack" role="status" aria-label="Informacje bez JavaScriptu">
                  <h2>Przeglądanie kategorii bez JavaScriptu</h2>
                  <p>
                    Interaktywna lista produktów i filtry nie są dostępne bez JavaScriptu.
                    Możesz jednak kontynuować zakupy, korzystając z poniższych stron:
                  </p>
                  <ul>
                    <li><a href="index.html">Strona główna z polecanymi produktami</a></li>
                    <li><a href="produkt.html">Przykładowa karta produktu</a></li>
                    <li><a href="kontakt.html">Kontakt z doradcą Outland Gear</a></li>
                  </ul>
                </section>
              </noscript>
              <div class="ui-state" data-listing-state hidden></div>
              <div class="section-actions text-center">
                <button class="btn btn--ghost" type="button" data-load-more>
                  Pokaż więcej
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

    <footer class="site-footer" aria-label="Stopka Outland Gear" data-partial-src="partials/footer.html"></footer>
