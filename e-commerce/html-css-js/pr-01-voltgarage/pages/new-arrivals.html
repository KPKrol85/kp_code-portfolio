    <link rel="apple-touch-icon" href="/assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Theme preload -->
    <script data-theme-preload>
      (function () {
        var storageKey = 'vg_theme';
        var theme = null;
        try {
          theme = localStorage.getItem(storageKey);
        } catch (e) {
          theme = null;
        }
        if (theme !== 'light' && theme !== 'dark') {
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          theme = prefersDark ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <!-- Preloads -->
    <link
      rel="preload"
      href="/assets/fonts/space-grotesk/SpaceGrotesk-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

              Nowości ładują się dynamicznie. Włącz JavaScript, aby zobaczyć aktualną listę.
            </p>
          </div>
        </div>

        <div class="container new-arrivals-cta">

            <a class="btn btn-accent" href="shop.html">Zobacz wszystkie produkty</a>
          </div>

    </main>
