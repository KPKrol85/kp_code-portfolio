<!doctype html>
<html lang="pl">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Dokończ zamówienie w VOLT GARAGE – uzupełnij dane dostawy, wybierz metodę płatności i sprawdź końcowe podsumowanie koszyka."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" />
    <!-- Title -->
    <title>Zamówienie | VOLT GARAGE – finalizacja</title>
    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://e-commerce-pr01-voltgarage.netlify.app/pages/checkout.html"
    />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zamówienie | VOLT GARAGE – finalizacja" />
    <meta
      property="og:description"
      content="Finalizacja zamówienia VOLT GARAGE – dane dostawy, metody płatności i podsumowanie koszyka."
    />
    <meta
      property="og:url"
      content="https://e-commerce-pr01-voltgarage.netlify.app/pages/checkout.html"
    />
    <meta
      property="og:image"
      content="https://e-commerce-pr01-voltgarage.netlify.app/assets/images/og/og-1200x630.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zamówienie | VOLT GARAGE – finalizacja" />
    <meta
      name="twitter:description"
      content="Finalizacja zamówienia VOLT GARAGE – dane dostawy, metody płatności i podsumowanie koszyka."
    />
    <meta
      name="twitter:image"
      content="https://e-commerce-pr01-voltgarage.netlify.app/assets/images/og/og-1200x630.jpg"
    />
    <!-- Favicons + manifest -->
    <link rel="icon" href="/assets/icons/favicon/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon/favicon.svg" />
    <link rel="apple-touch-icon" href="/assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Theme preload -->
    <script data-theme-preload>
      (function () {
        var storageKey = 'vg_theme';
        var theme = null;
        try {
          theme = localStorage.getItem(storageKey);
        } catch (e) {
          theme = null;
        }
        if (!theme) {
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          theme = prefersDark ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <!-- Preloads -->
    <link
      rel="preload"
      href="/assets/fonts/space-grotesk/SpaceGrotesk-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Styles -->
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body class="page page--checkout">
    <!-- @include src/partials/header.html -->

    <main id="main">
      <nav class="breadcrumbs" aria-label="Okruszki">
        <ol>
          <li><a href="../index.html">Strona główna</a></li>
          <li>Zamówienie</li>
        </ol>
      </nav>

      <section class="page-hero">
        <div class="container">
          <h1>Zamówienie</h1>
          <p>Finalizacja zamówienia bez backendu, pełna walidacja po stronie klienta.</p>
          <span class="page-hero-mark" aria-hidden="true"></span>
        </div>
      </section>

      <section>
        <div class="container page-layout">
          <form class="form-grid" data-checkout-form data-reveal>
            <div class="section-title">
              <h2>Dane klienta</h2>
            </div>
            <div class="form-row">
              <label class="input-group">
                <span>Imię</span>
                <input
                  type="text"
                  name="firstName"
                  autocomplete="given-name"
                  required
                  aria-required="true"
                />
              </label>
              <label class="input-group">
                <span>Nazwisko</span>
                <input
                  type="text"
                  name="lastName"
                  autocomplete="family-name"
                  required
                  aria-required="true"
                />
              </label>
            </div>
            <div class="form-row">
              <label class="input-group">
                <span>E-mail</span>
                <input
                  type="email"
                  name="email"
                  autocomplete="email"
                  inputmode="email"
                  required
                  aria-required="true"
                />
              </label>
              <label class="input-group">
                <span>Telefon</span>
                <input
                  type="tel"
                  name="phone"
                  autocomplete="tel"
                  inputmode="tel"
                  pattern="^[0-9+][0-9\\s-]{6,19}$"
                  required
                  aria-required="true"
                />
              </label>
            </div>
            <div class="section-title">
              <h2>Dostawa</h2>
            </div>
            <div class="form-row">
              <label class="input-group">
                <span>Ulica i numer</span>
                <input
                  type="text"
                  name="street"
                  autocomplete="address-line1"
                  required
                  aria-required="true"
                />
              </label>
              <label class="input-group">
                <span>Miasto</span>
                <input
                  type="text"
                  name="city"
                  autocomplete="address-level2"
                  required
                  aria-required="true"
                />
              </label>
            </div>
            <div class="form-row">
              <label class="input-group">
                <span>Kod pocztowy</span>
                <input
                  type="text"
                  name="zip"
                  autocomplete="postal-code"
                  inputmode="numeric"
                  pattern="^[0-9]{2}-?[0-9]{3}$"
                  required
                  aria-required="true"
                  placeholder="00-000"
                />
              </label>
              <label class="input-group">
                <span>Kraj</span>
                <select name="country" required aria-required="true">
                  <option value="">Wybierz</option>
                  <option value="PL">Polska</option>
                  <option value="CZ">Czechy</option>
                  <option value="DE">Niemcy</option>
                </select>
              </label>
            </div>
            <label class="input-group">
              <span>Uwagi do zamówienia</span>
              <textarea name="note" rows="3"></textarea>
            </label>
            <button class="btn btn-accent" type="submit">Złóż zamówienie</button>
            <p class="notice" role="status" aria-live="polite" data-form-status></p>
          </form>
          <aside class="total-panel" data-reveal>
            <h3>Podsumowanie koszyka</h3>
            <div class="stacked" data-checkout-summary>
              <span>Wartość produktów: <strong data-cart-subtotal>0 zł</strong></span>
              <span>Dostawa: <strong data-cart-shipping>0 zł</strong></span>
              <span>Razem: <strong data-cart-total>0 zł</strong></span>
            </div>
            <p class="notice">Darmowa dostawa od 300 zł.</p>
          </aside>
        </div>
      </section>
    </main>

    <!-- @include src/partials/footer.html -->

    <script type="module" src="../js/main.js"></script>
  </body>
</html>
